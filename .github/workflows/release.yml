name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  verify:
    name: Verify release tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check tag matches Cargo.toml version
        run: |
          TAG="${GITHUB_REF_NAME}"
          CARGO_VERSION="v$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)"
          if [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "error: tag '$TAG' does not match Cargo.toml version '$CARGO_VERSION'"
            exit 1
          fi
          echo "OK: $TAG"

  build:
    name: Build · ${{ matrix.artifact }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            use-cross: true
            artifact: linux-amd64
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            use-cross: true
            artifact: linux-arm64
          - target: x86_64-apple-darwin
            runner: macos-latest
            use-cross: false
            artifact: macos-amd64
          - target: aarch64-apple-darwin
            runner: macos-latest
            use-cross: false
            artifact: macos-arm64
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            use-cross: false
            artifact: windows-x86_64

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/skm skm-${{ matrix.artifact }}

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        run: copy target\${{ matrix.target }}\release\skm.exe skm-${{ matrix.artifact }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: skm-${{ matrix.artifact }}
          path: skm-${{ matrix.artifact }}*
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create checksums
        working-directory: artifacts
        run: sha256sum skm-* > SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/skm-*
            artifacts/SHA256SUMS.txt
          generate_release_notes: true
